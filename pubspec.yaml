name: routenest
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # State management
  provider: ^6.1.5+1
  path: ^1.9.1
  # Database
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5
  # Maps (later)
  google_maps_flutter: ^2.17.0
  # Location (later)
  geolocator: ^10.1.1
  # Sharing
  share_plus: ^7.2.2
  dio: ^5.4.0
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.2

flutter:
  uses-material-design: true
  assets:
    - .env
